name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  quality-and-tests:
    name: Quality checks and tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with Ruff
        run: ruff check src tests dashboard

      - name: Check formatting with Black
        run: black --check src tests dashboard

      - name: Run tests
        run: pytest -q

      - name: Generate synthetic data
        run: python -m container_forecasting.data.make_synthetic_data

      - name: Run training smoke test
        run: python -m container_forecasting.models.train

      - name: Upload model reports
        uses: actions/upload-artifact@v7
        with:
          name: model-reports-python-${{ matrix.python-version }}
          path: |
            reports/model_results.csv
            reports/predictions_*.csv
            reports/figures/*.png
